name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  receipt-eval-canary:
    name: Receipt Eval (Canary)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run canary eval
        run: >
          python scripts/run_receipt_eval.py
          --mode eval
          --dataset evals/receipt_canary.jsonl
          --output-dir eval_artifacts

      - name: Upload canary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: receipt-eval-canary-artifacts
          path: backend/eval_artifacts/*
          if-no-files-found: error

  receipt-eval-full:
    name: Receipt Eval (Full on Extraction Changes)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect extraction-sensitive file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            extraction:
              - 'backend/app/services/parser_service.py'
              - 'backend/app/schemas/expense.py'
              - 'backend/app/api/v1/receipts.py'
              - 'backend/scripts/run_receipt_eval.py'
              - 'backend/evals/**'

      - name: Set up Python
        if: steps.changes.outputs.extraction == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        if: steps.changes.outputs.extraction == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Run full eval
        if: steps.changes.outputs.extraction == 'true'
        run: >
          python scripts/run_receipt_eval.py
          --mode eval
          --dataset evals/receipt_full.jsonl
          --output-dir eval_artifacts

      - name: Upload full-eval artifacts
        if: steps.changes.outputs.extraction == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: receipt-eval-full-artifacts
          path: backend/eval_artifacts/*
          if-no-files-found: error

      - name: Skip full eval (no extraction-sensitive changes)
        if: steps.changes.outputs.extraction != 'true'
        run: echo "No extraction-sensitive changes; full eval skipped by policy."

  lint-and-tests:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        run: pytest -q

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Run migrations on fresh SQLite DB
        run: |
          export DATABASE_URL="sqlite:///./ci_phase0.db"
          alembic upgrade head

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install audit tool
        run: python -m pip install pip-audit

      - name: Build dependency list from pyproject
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          
          pyproject = Path("pyproject.toml")
          data = tomllib.loads(pyproject.read_text())
          project = data.get("project", {})
          
          deps = list(project.get("dependencies", []))
          for extra_deps in project.get("optional-dependencies", {}).values():
              deps.extend(extra_deps)
          
          output = Path("requirements-audit.txt")
          output.write_text("\n".join(deps) + "\n")
          print(f"Wrote {len(deps)} requirements to {output}")
          PY

      - name: Run dependency vulnerability audit
        run: pip-audit --strict -r requirements-audit.txt
