name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  lint-and-tests:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        run: pytest -q

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Run migrations on fresh SQLite DB
        run: |
          export DATABASE_URL="sqlite:///./ci_phase0.db"
          alembic upgrade head

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies and audit tool
        run: python -m pip install -e . pip-audit

      - name: Run dependency vulnerability audit
        run: pip-audit --strict
