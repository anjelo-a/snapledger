name: PR Agents/Skills Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-checklist:
    name: Require AGENTS/SKILLS acknowledgment
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR body checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request && context.payload.pull_request.body) || "";
            const required = /- \[[xX]\] I reviewed `Agents\.md` and `Skills\.md` before making code changes, and this PR complies with both documents\./;

            if (!required.test(body)) {
              core.setFailed([
                "Missing required checklist confirmation.",
                "Please check this box in the PR description:",
                "- [x] I reviewed `docs/governance/AGENTS.md` and `docs/governance/SKILLS.md` before making code changes, and this PR complies with both documents."
              ].join("\n"));
            }
