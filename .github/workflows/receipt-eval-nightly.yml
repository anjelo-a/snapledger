name: Receipt Eval Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-receipt-eval:
    name: Full Receipt Eval
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run full receipt eval
        run: >
          python scripts/run_receipt_eval.py
          --mode eval
          --dataset evals/receipt_full.jsonl
          --output-dir eval_artifacts

      - name: Run deterministic perf sweep
        run: >
          python scripts/run_receipt_eval.py
          --mode perf
          --dataset evals/receipt_full.jsonl
          --repeats 3
          --output-dir eval_artifacts

      - name: Upload nightly eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: receipt-eval-nightly-artifacts
          path: backend/eval_artifacts/*
          if-no-files-found: error
